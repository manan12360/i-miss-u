<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Sukhman</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sky-blue: #050b1a;
            --scroll-yellow: #fff9e6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at center, #1a3a63 0%, var(--sky-blue) 100%);
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            perspective: 2000px;
        }

        #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.6; }

        /* --- THE CROWDED COLLAGE --- */
        #collage {
            position: fixed; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; pointer-events: none;
        }
        .v-photo {
            position: absolute; width: 130px; height: 170px; 
            background: #111; border: 3px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 2px; overflow: hidden;
        }
        .v-photo img { width: 100%; height: 100%; object-fit: cover; }

        /* --- THE ENVELOPE --- */
        #container { position: relative; z-index: 10; width: 310px; height: 210px; cursor: pointer; }
        
        .envelope {
            width: 100%; height: 100%; background: #f2ede0;
            position: relative; transform-style: preserve-3d;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .flap {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #e3dec9; clip-path: polygon(0 0, 100% 0, 50% 50%);
            transform-origin: top; z-index: 50; 
        }

        /* --- THE SCROLL (MOBILE OPTIMIZED) --- */
        #scroll {
            position: absolute; top: 10%; left: 5%; width: 90%; height: 0;
            background: var(--scroll-yellow); border-radius: 2px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            opacity: 0; z-index: 5;
            overflow-y: auto; display: flex; flex-direction: column; align-items: center;
            padding: 40px 25px; box-sizing: border-box;
            transform: translateZ(1px);
            scrollbar-width: none; 
        }
        #scroll::-webkit-scrollbar { display: none; }

        .scroll-content { 
            font-family: 'Pacifico', cursive; font-size: 1.15rem; line-height: 1.8; 
            color: #3e2723; text-align: center;
            word-wrap: break-word;
        }

        .char { opacity: 0; filter: blur(8px); display: inline-block; }
        .word { display: inline-block; white-space: nowrap; margin-right: 0.35em; }
    </style>
</head>
<body>

    <div id="stars"></div>
    <div id="collage"></div>

    <div id="container">
        <div class="envelope" id="env">
            <div class="flap" id="flap"></div>
            <div style="position:absolute; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Pacifico'; opacity:0.6; color:#2c3e50;">
                <p>For Sukhman</p>
                <p style="font-family:'Quicksand'; font-size:0.6rem; margin-top:10px; letter-spacing:2px;">( Tap to open )</p>
            </div>
            
            <div id="scroll">
                <div class="scroll-content" id="letter-body"></div>
            </div>
        </div>
    </div>

    <audio id="voice">
        <source src="audio.ogg" type="audio/ogg">
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 1. GENERATE COLLAGE (Reduced to 16 photos, .jpeg extension)
        const collage = document.getElementById('collage');
        for (let i = 1; i <= 16; i++) {
            const div = document.createElement('div');
            div.className = 'v-photo';
            const angle = (i / 16) * Math.PI * 2;
            const radius = 190 + Math.random() * 150;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            const rot = Math.random() * 60 - 30;
            gsap.set(div, { x: x, y: y, rotation: rot, zIndex: i });
            div.innerHTML = `<img src="v${i}.jpeg" alt="Memory ${i}">`;
            collage.appendChild(div);
        }

        // 2. STARS
        const starCont = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            gsap.set(star, { x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, width: size, height: size });
            starCont.appendChild(star);
            if (i % 5 === 0) gsap.to(star, { opacity: 0.2, duration: 2, repeat: -1, yoyo: true });
        }

        // 3. LETTER CONTENT
        const letterText = `Hi babe, it’s your Spidey. How are you? And how is everything been? Just missing you a lot. I hope you’re having fun, and I really do hope you’re having a lot of fun and your getting your detox. I am not making this because I feel sad that You’re not here. Yes, I do, but that’s not the reason. I’m making this because I love you and I guess this is my way of showing love. I just like making this for you like whenever I miss you because I feel like this is something I can do. I cant do much, but I feel like I can do this for you at least to make you feel a bit special. I just want to say a few things. yeah, I dont want to over-apologise but just accept my apology for being a piece of shit sometimes I know I’m working on it. I can’t guarantee you that I can fix it because I can’t give you false hopes, but I can guarantee that I will put my efforts to fix this. We’ll work it out because I really want us to. i’m sorry for overreacting and ik it’s a bad habit. I know it needs to be worked upon and I will, but I love sukhman. You are the best girlfriend. I miss you when you’re not here. I know you’re there with me on the call, and I know, yeah, it’s still the same, but I just miss you. no, I do not have a problem with distance anymore, but the thing is. I will always miss you and always miss you. No matter you are at home,, in another country or another planet.Even after i die, I’ll always miss you because you made me feel special things for me, but I couldn’t do half as much you do for me, so I just make this silly letter and hope that you feel that you are special. Iam am sorry for not being the best boyfriend being greatest or the best gifting boyfriend because I can’t gift. I don’t know why I always mess up when I try to give someone something. Just wanted to say thank you sukhman.I love you`;
        
        const body = document.getElementById('letter-body');
        body.innerHTML = letterText.split(' ').map(word => {
            const wordChars = word.split('').map(c => `<span class="char">${c}</span>`).join('');
            return `<span class="word">${wordChars}</span>`;
        }).join('');

        const chars = document.querySelectorAll('.char');

        // 4. THE MAGIC OPENING
        document.getElementById('container').addEventListener('click', function() {
            if (this.dataset.opened) return;
            this.dataset.opened = "true";

            const tl = gsap.timeline();
            const voice = document.getElementById('voice');

            // Force audio with 1-second delay
            voice.load();
            setTimeout(() => {
                voice.play().catch(() => {});
            }, 1000);

            tl.to("#flap", { rotateX: 180, duration: 1.2, ease: "power4.inOut" })
              .set("#scroll", { zIndex: 100 }) 
              .to(".v-photo", { 
                  x: (i, t) => parseFloat(gsap.getProperty(t, "x")) * 1.7,
                  y: (i, t) => parseFloat(gsap.getProperty(t, "y")) * 1.7,
                  opacity: 0.25, duration: 2.5, ease: "expo.out"
              }, 0)
              .to("#scroll", { 
                  opacity: 1, 
                  height: "75vh", 
                  y: -280, // Slightly reduced vertical offset to prevent overlapping too far up
                  duration: 2, 
                  ease: "expo.out"
              }, "-=0.3")
              .to(chars, { 
                  opacity: 1, 
                  filter: "blur(0px)", 
                  stagger: 0.09, // Slower typing speed (half speed)
                  duration: 0.1 
              }, "-=0.8");

            gsap.to("#container", { y: -18, duration: 3, repeat: -1, yoyo: true, ease: "sine.inOut" });
        });
    </script>
</body>
</html>
